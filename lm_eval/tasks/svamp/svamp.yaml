group:
  - math_word_problems
task: svamp
dataset_path: ChilleD/SVAMP
dataset_name: default
output_type: generate_until
training_split: train
validation_split: null
test_split: test
num_fewshot: 0
doc_to_text: "Question: {{question_concat}}\nAnswer:"
doc_to_target: "{{Answer}}"
should_decontaminate: true
doc_to_decontamination_query: "{{question_concat}}"
generation_kwargs:
  until:
    - "\n"
    - "."
    - ","
    - "?"
  do_sample: false
  temperature: 0.0
filter_list:
  - name: remove_whitespace
    filter:
      - function: remove_whitespace
      - function: take_first
target_delimiter: " "
metric_list:
  - metric: exact_match
    aggregation: mean
    higher_is_better: true
    ignore_case: true
    ignore_punctuation: true
  - metric: perplexity
    aggregation: perplexity
    higher_is_better: false
metadata:
  version: 1.0
