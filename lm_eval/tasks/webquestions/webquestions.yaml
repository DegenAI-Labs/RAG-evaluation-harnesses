task: webquestions
dataset_path: Stanford/web_questions
dataset_name: default
output_type: generate_until
training_split: train
validation_split: null
test_split: test
doc_to_text: "Question: {{ question }}\nAnswer:"
doc_to_target: "{{ answers[0] if answers and answers|length > 0 else '' }}"
should_decontaminate: true
doc_to_decontamination_query: "{{ question }}"
generation_kwargs:
  until:
    - "\n"
    - "."
    - ","
  do_sample: false
  temperature: 0.0
filter_list:
  - name: remove_whitespace
    filter:
      - function: remove_whitespace
      - function: take_first
target_delimiter: " "
metric_list:
  - metric: exact_match
    aggregation: mean
    higher_is_better: true
    ignore_case: true
    ignore_punctuation: true
metadata:
  version: 1.0
