task: fever
dataset_path: fever/fever
dataset_name: v1.0
output_type: multiple_choice
training_split: train
validation_split: labelled_dev
test_split: paper_test
doc_to_text: "Claim: {{ claim }}\nLabel:"
doc_to_target: "{{ label }}"
doc_to_choice:
  - SUPPORTS
  - REFUTES
  - NOT ENOUGH INFO
metric_list:
  - metric: acc
    aggregation: mean
    higher_is_better: true
  - metric: acc_norm
    aggregation: mean
    higher_is_better: true
  - metric: brier_score
    aggregation: brier_score
    higher_is_better: false
  - metric: perplexity
    aggregation: perplexity
    higher_is_better: false
metadata:
  version: 1.0
