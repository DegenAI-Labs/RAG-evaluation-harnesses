# Generate-until variant of PIQA for pipelines that only run `generate_until` tasks.
# Standard multiple-choice PIQA remains `piqa` (task name: piqa).
task: piqa_generative
# Parquet-backed mirror (canonical `piqa` uses a deprecated loading script on newer `datasets`).
dataset_path: lighteval/piqa
dataset_name: plain_text
output_type: generate_until
training_split: train
validation_split: validation
test_split: null
doc_to_text: "Question: {{goal}}\nChoose the more plausible ending:\n(A) {{sol1}}\n(B) {{sol2}}\nAnswer:"
doc_to_target: "{% if label == 0 %}A{% else %}B{% endif %}"
should_decontaminate: true
doc_to_decontamination_query: "{{goal}}"
generation_kwargs:
  until:
    - "\n"
    - "."
  do_sample: false
  temperature: 0.0
filter_list:
  - name: remove_whitespace
    filter:
      - function: remove_whitespace
      - function: take_first
target_delimiter: " "
metric_list:
  - metric: exact_match
    aggregation: mean
    higher_is_better: true
    ignore_case: true
    ignore_punctuation: true
  - metric: perplexity
    aggregation: perplexity
    higher_is_better: false
metadata:
  version: 1.0
